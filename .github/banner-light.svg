<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f6f8fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969da" />
      <stop offset="50%" style="stop-color:#8250df" />
      <stop offset="100%" style="stop-color:#bf3989" />
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0969da" />
      <stop offset="100%" style="stop-color:#8250df" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="180" rx="12" fill="url(#bg)" stroke="#d0d7de" stroke-width="1"/>

  <!-- Border accent line -->
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Shield icon -->
  <g transform="translate(60, 38)">
    <path d="M50 8 L50 8 C50 8 30 0 10 0 C10 0 10 35 10 50 C10 75 30 95 50 105 C70 95 90 75 90 50 C90 35 90 0 90 0 C70 0 50 8 50 8Z"
          fill="url(#shield-fill)" opacity="0.1" stroke="url(#shield-fill)" stroke-width="2"/>
    <!-- Lock keyhole -->
    <circle cx="50" cy="42" r="10" fill="none" stroke="url(#shield-fill)" stroke-width="2.5"/>
    <rect x="44" y="50" width="12" height="16" rx="2" fill="none" stroke="url(#shield-fill)" stroke-width="2.5"/>
    <circle cx="50" cy="58" r="2.5" fill="url(#shield-fill)"/>
  </g>

  <!-- Title -->
  <text x="175" y="68" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#1f2328" letter-spacing="-0.5">
    github-security-mcp
  </text>

  <!-- Subtitle -->
  <text x="175" y="98" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#656d76" letter-spacing="0.2">
    GitHub security posture analysis for AI agents
  </text>

  <!-- Stats pills -->
  <g transform="translate(175, 118)">
    <!-- 39 Tools -->
    <rect x="0" y="0" width="78" height="26" rx="13" fill="#0969da" opacity="0.08" stroke="#0969da" stroke-width="1" stroke-opacity="0.25"/>
    <text x="39" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#0969da" text-anchor="middle" font-weight="600">39 tools</text>

    <!-- 45 Checks -->
    <rect x="90" y="0" width="84" height="26" rx="13" fill="#8250df" opacity="0.08" stroke="#8250df" stroke-width="1" stroke-opacity="0.25"/>
    <text x="132" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#8250df" text-anchor="middle" font-weight="600">45 checks</text>

    <!-- MCP -->
    <rect x="186" y="0" width="58" height="26" rx="13" fill="#bf3989" opacity="0.08" stroke="#bf3989" stroke-width="1" stroke-opacity="0.25"/>
    <text x="215" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#bf3989" text-anchor="middle" font-weight="600">MCP</text>

    <!-- 6 categories -->
    <rect x="256" y="0" width="100" height="26" rx="13" fill="#1a7f37" opacity="0.08" stroke="#1a7f37" stroke-width="1" stroke-opacity="0.25"/>
    <text x="306" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#1a7f37" text-anchor="middle" font-weight="600">6 categories</text>
  </g>
</svg>
