<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff" />
      <stop offset="50%" style="stop-color:#bc8cff" />
      <stop offset="100%" style="stop-color:#f778ba" />
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff" />
      <stop offset="100%" style="stop-color:#bc8cff" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="180" rx="12" fill="url(#bg)" />

  <!-- Border accent line -->
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Shield icon -->
  <g transform="translate(60, 38)">
    <path d="M50 8 L50 8 C50 8 30 0 10 0 C10 0 10 35 10 50 C10 75 30 95 50 105 C70 95 90 75 90 50 C90 35 90 0 90 0 C70 0 50 8 50 8Z"
          fill="url(#shield-fill)" opacity="0.15" stroke="url(#shield-fill)" stroke-width="2"/>
    <!-- Lock keyhole -->
    <circle cx="50" cy="42" r="10" fill="none" stroke="url(#shield-fill)" stroke-width="2.5"/>
    <rect x="44" y="50" width="12" height="16" rx="2" fill="none" stroke="url(#shield-fill)" stroke-width="2.5"/>
    <circle cx="50" cy="58" r="2.5" fill="url(#shield-fill)"/>
  </g>

  <!-- Title -->
  <text x="175" y="68" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    github-security-mcp
  </text>

  <!-- Subtitle -->
  <text x="175" y="98" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#8b949e" letter-spacing="0.2">
    GitHub security posture analysis for AI agents
  </text>

  <!-- Stats pills -->
  <g transform="translate(175, 118)">
    <!-- 39 Tools -->
    <rect x="0" y="0" width="78" height="26" rx="13" fill="#58a6ff" opacity="0.12" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="39" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="600">39 tools</text>

    <!-- 45 Checks -->
    <rect x="90" y="0" width="84" height="26" rx="13" fill="#bc8cff" opacity="0.12" stroke="#bc8cff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="132" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="600">45 checks</text>

    <!-- MCP -->
    <rect x="186" y="0" width="58" height="26" rx="13" fill="#f778ba" opacity="0.12" stroke="#f778ba" stroke-width="1" stroke-opacity="0.3"/>
    <text x="215" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#f778ba" text-anchor="middle" font-weight="600">MCP</text>

    <!-- 6 categories -->
    <rect x="256" y="0" width="100" height="26" rx="13" fill="#3fb950" opacity="0.12" stroke="#3fb950" stroke-width="1" stroke-opacity="0.3"/>
    <text x="306" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">6 categories</text>
  </g>
</svg>
